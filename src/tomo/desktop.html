<!--
  Tomo Desktop UI (loaded by desktop.py)
  This file contains the full HTML/CSS/JS for the pywebview-based desktop flyout.
  Edit here directly — no more giant f-string in Python.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tomo</title>
<style>
:root {
  --ink: #ffffff;
  --muted: rgba(23, 26, 29, .62);
  --line: rgba(23, 26, 29, .14);
  --glass: rgba(255, 255, 255, .2);
  --user: rgba(18, 63, 53, .2);
  --accent: #2f8f67;
  --danger: #9b2f2f;
  --tool: #26323a;
}
* { box-sizing: border-box; }
* { scrollbar-width: none; }
*::-webkit-scrollbar { display: none; }
html, body { min-height: 0; margin: 0; background: transparent; }
body {
  background: transparent;
  color: var(--ink);
  font-family: "Aptos", "Segoe UI", sans-serif;
  font-size: 14px;
  overflow: hidden;
}
button { font: inherit; }
.shell { display: block; }
.meta-row { padding: 8px 4px 0; }
.meta { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
main { min-height: 0; display: grid; grid-template-rows: auto auto; }
#transcript { overflow-y: auto; padding: 18px 16px 14px; }
.msg { width: fit-content; max-width: 88%; margin: 0 0 14px; }
.msg.user { margin-left: 0; }
.bubble {
  padding: 11px 12px;
  border: 1px solid var(--line);
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 8px;
  line-height: 1.45;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.user .bubble { background: var(--user); color: var(--ink); border-color: rgba(18, 63, 53, .2); }
.speaker { font-size: 11px; color: var(--muted); margin: 0 0 4px 2px; }
.user .speaker { text-align: left; margin-right: 2px; }
.images { display: grid; gap: 8px; margin-top: 8px; }
.images img { max-width: 100%; border-radius: 6px; border: 1px solid var(--line); }
.tools-message { width: fit-content; max-width: 88%; }
.tools-bubble {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, .24);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  color: var(--ink);
  overflow: hidden;
}
.tools-bubble summary {
  cursor: pointer;
  padding: 9px 11px;
  color: rgba(255, 255, 255, .9);
  font-size: 12px;
  list-style: none;
}
.tools-bubble summary::-webkit-details-marker { display: none; }
.tools-bubble summary::before { content: ">"; display: inline-block; margin-right: 7px; color: #82e1b1; }
.tools-bubble[open] summary::before { transform: rotate(90deg); }
.tool-list {
  display: grid;
  gap: 6px;
  padding: 0 11px 10px;
  font-family: "Cascadia Mono", "Consolas", monospace;
  font-size: 12px;
}
.tool-row { color: rgba(255, 255, 255, .82); overflow-wrap: anywhere; }
#approval { display: none; border-top: 1px solid var(--line); background: #fff7df; padding: 12px 14px; }
#approval.visible { display: block; }
#approval-title { font-weight: 700; margin-bottom: 5px; }
#approval-body { color: #4b4430; white-space: pre-wrap; overflow-wrap: anywhere; }
.approval-actions { display: flex; gap: 8px; margin-top: 10px; }
.composer { padding: 12px; }
button {
  background: transparent;
  color: white;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 14px;
  cursor: pointer;
}
button.secondary { background: transparent; color: var(--ink); }
button.danger { background: var(--danger); border-color: var(--danger); }
.voice-button {
  width: fit-content;
  min-height: 44px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: transparent;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  color: var(--ink);
  font-weight: 650;
}
.voice-button svg { width: 17px; height: 17px; stroke-width: 2; }
.voice-button.listening,
.voice-button.sending,
.voice-button.working { background: transparent; border-color: var(--accent); color: var(--accent); }
button:disabled { opacity: .45; cursor: default; }
.empty { display: none; }

/* New composer glass styles (from polished prototype) - braces doubled for f-string */
.glass-outer {
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 22px;
  corner-shape: squircle;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.glass-inner {
  background: rgba(0, 0, 0, 0.60);
  border-radius: 22px;
  corner-shape: squircle;
  position: relative;
  padding: 0;
  min-height: 64px;
}
.glass-text {
  padding: 10px 12px 52px 12px;
  font-size: 14.5px;
  line-height: 1.45;
  color: #e6e9e4;
  min-height: 52px;
}
.glass-text input {
  color: #e6e9e4;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14.5px;
  width: 100%;
}
.glass-text input::placeholder {
  color: #8b9285;
}
.composer-actions {
  position: absolute;
  bottom: 6px;
  left: 6px;
  right: 6px;
  display: flex;
  align-items: center;
}
.preview-thumb {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  corner-shape: squircle;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.15);
  background: rgba(0, 0, 0, 0.25);
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 1px 2px rgb(0 0 0 / 0.2);
}
.preview-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.preview-remove {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 16px;
  height: 16px;
  background: rgba(0,0,0,0.65);
  color: white;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  opacity: 0;
  transition: opacity .1s ease;
  cursor: pointer;
}
.preview-thumb:hover .preview-remove {
  opacity: 1;
}
.ref-header {
  font-size: 12.5px;
  font-weight: 600;
  color: #c3c9c1;
  background: rgba(255, 255, 255, 0.08);
  padding: 4px 12px;
  border-radius: 10px;
  corner-shape: squircle;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.ref-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255, 255, 255, 0.10);
  color: #e6e9e4;
  font-size: 12.5px;
  font-weight: 600;
  padding: 3px 10px 3px 9px;
  border-radius: 9999px;
  corner-shape: squircle;
  white-space: nowrap;
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.ref-pill .remove {
  width: 15px;
  height: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 9999px;
  margin-left: 2px;
  color: #a3b3a3;
  font-size: 10px;
  cursor: pointer;
}
.action-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 11px;
  color: #c3c9c1;
  font-size: 16px;
  transition: all 0.1s ease;
  background: transparent;
  border: none;
  cursor: pointer;
  line-height: 1;
}
.action-btn svg {
  width: 22px;
  height: 22px;
}
.action-btn:hover {
  background: rgba(255,255,255,0.1);
}
.action-btn.send {
  background: #2f8f67;
  color: white;
  /* width: 44px;
  height: 44px; */
  border-radius: 12px;
}
.action-btn.send svg {
  width: 24px;
  height: 24px;
}
.action-btn.send:hover {
  background: #267a57;
}
.action-btn.mic.listening {
  background: #b91c1c;
  color: white;
}
</style>
</head>
<body>
<div class="shell">
  <main>
    <div id="transcript"><div class="empty">No messages yet.</div></div>
    <div id="bottom-panel">
      <div id="approval">
        <div id="approval-title">Approval required</div>
        <div id="approval-body"></div>
        <div class="approval-actions">
          <button id="approve">Approve</button>
          <button id="deny" class="danger">Deny</button>
        </div>
      </div>
      <div class="composer" id="composer">
        <div class="glass-outer">
          <div id="composer-meta" style="font-size:10px; color:#8b9285; padding:0 4px 2px; opacity:0.7;"></div>
          <div id="composer-previews" style="display:none;">
            <div id="composer-thumbs" style="display:flex; gap:8px; padding:0 4px 4px;"></div>
          </div>
          <div id="composer-ref-header" style="display:none; padding:0 4px;"></div>
          <div class="glass-inner">
            <div class="glass-text" id="composer-text-zone">
              <!-- populated by JS: plain input or ref-pill + input -->
            </div>
            <div class="composer-actions">
              <button id="composer-attach" class="action-btn" title="Attach image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <g transform="scale(1.1) translate(-1.2 -1.2)">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
                  </g>
                </svg>
              </button>
              <div style="flex:1;"></div>
              <div style="display:flex; align-items:center; gap:4px;">
                <button id="composer-mic" class="action-btn mic" title="Voice input">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <path d="M12 19v3"></path>
                  </svg>
                </button>
                <button id="composer-send" class="action-btn send" title="Send">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <g transform="scale(1.15) translate(-1.8 -1.8)">
                      <path d="M12 4 L20 12 L16 12 L16 20 L8 20 L8 12 L4 12 Z"/>
                    </g>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
        <input type="file" id="composer-attach-input" accept="image/*" multiple style="display:none;">
      </div>
    </div>
  </main>
</div>
<script>
const transcript = document.getElementById('transcript');
const bottomPanel = document.getElementById('bottom-panel');
const composer = document.getElementById('composer');
const approval = document.getElementById('approval');
const approvalBody = document.getElementById('approval-body');
const approve = document.getElementById('approve');
const deny = document.getElementById('deny');
let busy = false;
let pendingApproval = null;
let voiceState = 'idle';
let streamingBubble = null;
let currentToolGroup = null;
let resizeTimer = null;

// New composer elements (rich glass input)
const composerAttach = document.getElementById('composer-attach');
const composerMic = document.getElementById('composer-mic');
const composerSend = document.getElementById('composer-send');
const composerMetaEl = document.getElementById('composer-meta');
const attachInput = document.getElementById('composer-attach-input');

// Composer state
let composerAttachments = [];
let composerActiveRef = null;
let suppressNextUserMessage = false;

function api() { return window.pywebview.api; }
function setBusy(value) {
  busy = value;
  if (composerMic) composerMic.disabled = value || !!pendingApproval;
  if (composerSend) composerSend.disabled = value || !!pendingApproval;
  if (composerMic) composerMic.classList.toggle('working', value);
  if (value) {
    // mic shows sending state via class
  } else {
    updateVoiceButton();
  }
}
function clearEmpty() {
  const empty = transcript.querySelector('.empty');
  if (empty) empty.remove();
}
function scrollBottom() { transcript.scrollTop = transcript.scrollHeight; }
async function resizeFlyout() {
  const maxHeight = 700;
  const naturalTranscriptHeight = Math.max(transcript.scrollHeight, transcript.offsetHeight);
  const bottomHeight = bottomPanel.offsetHeight;
  const naturalHeight = Math.ceil(naturalTranscriptHeight + bottomHeight);
  const targetHeight = Math.max(96, Math.min(maxHeight, naturalHeight));
  const transcriptHeight = Math.max(0, targetHeight - bottomHeight);
  transcript.style.maxHeight = `${transcriptHeight}px`;
  transcript.style.overflowY = naturalTranscriptHeight > transcriptHeight ? 'auto' : 'hidden';
  try {
    if (api().resize_flyout) await api().resize_flyout(targetHeight);
  } catch (_) {}
  scrollBottom();
}
function scheduleResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeFlyout, 0);
}
function addMessage(role, text, images = []) {
  clearEmpty();
  streamingBubble = null;
  if (role === 'user') currentToolGroup = null;
  const row = document.createElement('section');
  row.className = `msg ${role}`;
  const speaker = document.createElement('div');
  speaker.className = 'speaker';
  speaker.textContent = role === 'user' ? 'You' : 'Tomo';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text || '';
  row.append(speaker, bubble);
  if (images.length) {
    const imageWrap = document.createElement('div');
    imageWrap.className = 'images';
    for (const url of images) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'Generated image';
      imageWrap.appendChild(img);
    }
    row.appendChild(imageWrap);
  }
  transcript.appendChild(row);
  scrollBottom();
  scheduleResize();
  return bubble;
}
function addDelta(text) {
  if (!streamingBubble) streamingBubble = addMessage('assistant', '');
  streamingBubble.textContent += text;
  scrollBottom();
  scheduleResize();
}
function addTool(event) {
  clearEmpty();
  if (!currentToolGroup) {
    const row = document.createElement('section');
    row.className = 'msg tools-message';
    const details = document.createElement('details');
    details.className = 'tools-bubble';
    const summary = document.createElement('summary');
    const list = document.createElement('div');
    list.className = 'tool-list';
    details.append(summary, list);
    row.appendChild(details);
    transcript.appendChild(row);
    currentToolGroup = { count: 0, summary, list };
  }
  currentToolGroup.count += 1;
  currentToolGroup.summary.textContent = `tools ${currentToolGroup.count} tool call${currentToolGroup.count === 1 ? '' : 's'}`;
  const row = document.createElement('div');
  row.className = 'tool-row';
  row.textContent = `${event.name}: "${event.input || ''}"`;
  currentToolGroup.list.appendChild(row);
  scrollBottom();
  scheduleResize();
}
function showApproval(event) {
  pendingApproval = event.id;
  approvalBody.textContent = `${event.operation} ${event.target}\\n\\n${event.reason}`;
  approval.classList.add('visible');
  setBusy(busy);
  scheduleResize();
}
function hideApproval() {
  pendingApproval = null;
  approval.classList.remove('visible');
  setBusy(busy);
  scheduleResize();
}
function setVoiceState(nextState) {
  voiceState = nextState || 'idle';
  updateVoiceButton();
  setBusy(busy);
  scheduleResize();
}
function updateVoiceButton() {
  if (!composerMic) return;
  composerMic.classList.toggle('listening', voiceState === 'listening');
  composerMic.classList.toggle('sending', voiceState === 'sending');
  if (voiceState === 'listening' || voiceState === 'sending') {
    composerMic.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;" aria-hidden="true">
      <rect x="6" y="6" width="12" height="12" rx="2"></rect>
    </svg>`;
    composerMic.title = (voiceState === 'listening') ? 'Cancel listening' : 'Stop sending';
  } else {
    composerMic.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:18px;height:18px;" aria-hidden="true">
      <g transform="scale(1.1) translate(-1.2 -1.2)">
        <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <path d="M12 19v3"></path>
      </g>
    </svg>`;
    composerMic.title = 'Voice input';
  }
  composerMic.setAttribute('aria-label', composerMic.title);
}

// === New rich composer logic (adapted from polished prototype) ===
function renderComposerPreviews() {
  const container = document.getElementById('composer-previews');
  const thumbs = document.getElementById('composer-thumbs');
  if (!container || !thumbs) return;
  thumbs.innerHTML = '';
  if (composerAttachments.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = '';
  composerAttachments.forEach((att, idx) => {
    const div = document.createElement('div');
    div.className = 'preview-thumb';
    div.innerHTML = `
      <img src="${att.url}" alt="attachment">
      <div class="preview-remove">×</div>
    `;
    div.querySelector('.preview-remove').onclick = (e) => {
      e.stopImmediatePropagation();
      composerAttachments.splice(idx, 1);
      renderComposerPreviews();
    };
    thumbs.appendChild(div);
  });
}

function renderComposerRef() {
  const el = document.getElementById('composer-ref-header');
  if (!el) return;
  if (!composerActiveRef) {
    el.style.display = 'none';
    return;
  }
  el.style.display = '';
  el.innerHTML = `
    <div class="ref-header text-xs mb-1">
      <span style="margin-right:4px;">🔗</span>
      <span class="font-semibold">${composerActiveRef}</span>
    </div>
  `;
}

function renderComposerTextZone() {
  const zone = document.getElementById('composer-text-zone');
  if (!zone) return;
  let html = '';
  if (composerActiveRef) {
    html = `
      <div style="display:flex; align-items:center; gap:8px; font-size:14px;">
        <div class="ref-pill">
          <span>${composerActiveRef}</span>
          <span class="remove cursor-pointer" onclick="clearComposerRef()" style="margin-left:4px;">×</span>
        </div>
        <input id="composer-input" type="text" placeholder="type something" style="flex:1; background:transparent; border:none; outline:none; color:#e6e9e4; font-size:14.5px;">
      </div>
    `;
  } else {
    html = `
      <input id="composer-input" type="text" placeholder="type something" style="width:100%; background:transparent; border:none; outline:none; color:#e6e9e4; font-size:14.5px;">
    `;
  }
  zone.innerHTML = html;
  const inp = zone.querySelector('#composer-input');
  if (inp) {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doComposerSend();
      }
    });
    setTimeout(() => inp.focus(), 0);
  }
}

function renderComposer() {
  renderComposerPreviews();
  renderComposerRef();
  renderComposerTextZone();
}

function clearComposerRef() {
  composerActiveRef = null;
  renderComposerRef();
  renderComposerTextZone();
}

function doComposerSend() {
  const zone = document.getElementById('composer-text-zone');
  const inp = zone ? zone.querySelector('input') : null;
  const text = inp ? inp.value.trim() : '';
  if (!text && composerAttachments.length === 0) return;

  const imgs = composerAttachments.map(a => a.url);
  if (imgs.length > 0) {
    suppressNextUserMessage = true;
    addMessage('user', text || ' ', imgs);
  }

  let sendText = text;
  if (composerActiveRef) {
    sendText = `[context: ${composerActiveRef}] ${text}`;
  }
  if (sendText) {
    api().send_message(sendText);
  } else if (imgs.length) {
    api().send_message('attached images');
  }

  // clear state
  composerAttachments = [];
  composerActiveRef = null;
  renderComposerPreviews();
  renderComposerRef();
  renderComposerTextZone();
}

// Setup for new composer (after elements exist)
if (attachInput) {
  attachInput.onchange = (e) => {
    const files = e.target.files || [];
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          composerAttachments.push({
            id: 'att' + Date.now() + Math.random().toString(36).slice(2),
            url: ev.target.result
          });
          renderComposerPreviews();
        };
        reader.readAsDataURL(file);
      }
    }
    e.target.value = '';
  };
}
if (composerAttach) {
  composerAttach.addEventListener('click', () => {
    if (attachInput) attachInput.click();
  });
}
if (composerSend) {
  composerSend.addEventListener('click', doComposerSend);
}
if (composerMic) {
  composerMic.addEventListener('click', async () => {
    if (voiceState === 'listening' || voiceState === 'sending') {
      await api().cancel_voice_input();
      setVoiceState('idle');
      return;
    }
    const result = await api().toggle_voice_input();
    if (!result.ok) addMessage('assistant', result.error || 'Unable to start voice input.');
  });
}

// initial render of the new composer UI
renderComposer();
async function handleEvent(event) {
  if (event.type === 'busy') setBusy(event.busy);
  if (event.type === 'user_message') {
    if (suppressNextUserMessage) {
      suppressNextUserMessage = false;
      return;
    }
    addMessage('user', event.text);
  }
  if (event.type === 'assistant_delta') addDelta(event.text);
  if (event.type === 'assistant_message') {
    if (streamingBubble) {
      if (event.images && event.images.length) {
        const imageWrap = document.createElement('div');
        imageWrap.className = 'images';
        for (const url of event.images) {
          const img = document.createElement('img');
          img.src = url;
          img.alt = 'Generated image';
          imageWrap.appendChild(img);
        }
        streamingBubble.parentElement.appendChild(imageWrap);
      }
      streamingBubble = null;
    } else {
      addMessage('assistant', event.text, event.images || []);
    }
  }
  if (event.type === 'tool_event') addTool(event);
  if (event.type === 'approval_request') showApproval(event);
  if (event.type === 'approval_resolved') hideApproval();
  if (event.type === 'error') addMessage('assistant', `Error: ${event.message}`);
  if (event.type === 'voice_state') {
    setVoiceState(event.state);
  }
  if (event.type === 'voice_final') setVoiceState('sending');
  if (event.type === 'voice_error') {
    setVoiceState('idle');
    addMessage('assistant', `Voice input error: ${event.message}`);
  }
}
async function poll() {
  try {
    const events = await api().poll_events();
    for (const event of events) await handleEvent(event);
  } finally {
    setTimeout(poll, 180);
  }
}
new ResizeObserver(scheduleResize).observe(bottomPanel);
new ResizeObserver(scheduleResize).observe(transcript);
// Old voice button listener removed - now using composerMic in the new rich composer.
// The click for composerMic is set in the new composer block above (adapted from old logic).
// Additional safety: if composerMic exists, ensure toggle works (already wired).
approve.addEventListener('click', () => pendingApproval && api().resolve_approval(pendingApproval, true));
deny.addEventListener('click', () => pendingApproval && api().resolve_approval(pendingApproval, false));
window.addEventListener('pywebviewready', async () => {
  const data = await api().bootstrap();
  if (data.ok) {
    if (composerMetaEl) composerMetaEl.textContent = `${data.model} · ${data.session.name}`;
    for (const message of data.messages) addMessage(message.role === 'user' ? 'user' : 'assistant', message.text, message.images || []);
    setVoiceState(data.voice_state || 'idle');
    setBusy(data.busy);
    renderComposer();
    scheduleResize();
  }
  poll();
});
</script>
